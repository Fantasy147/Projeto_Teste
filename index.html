<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyselfList - Galeria de Doramas</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>

<header class="topbar">
  <div class="logo-area">
    <img src="logo.webp" alt="Logo" class="logo">
    <h1>MyselfList</h1>
  </div>
</header>

<main>
  <h2 class="titulo-pagina">Galeria de Séries Asiáticas</h2>
  <div id="galeria" class="galeria-container"></div>
  <div id="paginacaoContainer" class="paginacao-wrapper"></div>
</main>

<!-- MODAL -->
<div id="modalDetalhes" class="modal">
  <div class="modal-content">
    <span class="close" id="fecharModal">&times;</span>
    <img id="modalCapa" class="modal-capa">
    <div class="modal-info">
      <h2 id="modalTitulo"></h2>
      <p><strong>Título Local:</strong> <span id="modalTitulo2"></span></p>
      <p><strong>País:</strong> <span id="modalPais"></span></p>
      <p><strong>Ano:</strong> <span id="modalAno"></span></p>
      <p><strong>Episódios:</strong> <span id="modalEpisodios"></span></p>
      <p><strong>Duração:</strong> <span id="modalDuracao"></span> min</p>
      <p><strong>Temporadas:</strong> <span id="modalTemporadas"></span></p>
      <hr>
      <p id="modalSinopse"></p>
    </div>
  </div>
</div>

<footer>
  &copy; 2025 MyselfList
</footer>

<script type="module" src="mainScript.js"></script>

</body>
</html>
